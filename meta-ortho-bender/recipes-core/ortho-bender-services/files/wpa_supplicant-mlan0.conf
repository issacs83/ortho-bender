ctrl_interface=/var/run/wpa_supplicant
ctrl_interface_group=0
update_config=1
autoscan=periodic:30

# Saved networks are managed via /api/wifi/connect (wpa_cli save_config).
# On boot, wpa_supplicant auto-connects to the strongest saved network.
# autoscan=periodic:30 ensures reconnection if the AP reboots.
