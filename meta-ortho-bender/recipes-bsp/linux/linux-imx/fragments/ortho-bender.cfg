# Kernel configuration fragment for Ortho-Bender Wire Bending Machine
#
# Applied on top of the imx8mp-lpddr4-evk_defconfig base.
# This fragment only sets options that differ from the EVK default.
#
# Usage (Yocto): referenced from linux-imx_%.bbappend via SRC_URI
# Usage (manual): scripts/kconfig/merge_config.sh -m .config fragments/ortho-bender.cfg
#
# Author   : Ortho-Bender BSP team
# SW Class : IEC 62304 Class B

# ---------------------------------------------------------------------------
# USB — xHCI host for Allied Vision Alvium 1800 U-158m (USB3 Vision)
# ---------------------------------------------------------------------------
CONFIG_USB=y
CONFIG_USB_SUPPORT=y
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_XHCI_PCI=n          # Not needed on i.MX8MP (platform xHCI)
CONFIG_USB_XHCI_PLATFORM=y

# USB3 Vision cameras appear as a bulk-transfer device; no class driver
# is needed in the kernel — user-space Vimba X SDK communicates directly.
# UVC is included for diagnostic webcams during development only.
CONFIG_USB_VIDEO_CLASS=m
CONFIG_MEDIA_SUPPORT=y
CONFIG_MEDIA_USB_SUPPORT=y

# ---------------------------------------------------------------------------
# SPI — ECSPI2 pinmux is configured by Linux; bus is disabled (M7 owned)
# Driver must be present so iomuxc pinctrl references resolve correctly.
# ---------------------------------------------------------------------------
CONFIG_SPI=y
CONFIG_SPI_IMX=y
CONFIG_SPI_SPIDEV=m             # Useful for M7 SPI debug from A53 console

# ---------------------------------------------------------------------------
# GPIO
# ---------------------------------------------------------------------------
CONFIG_GPIO_SYSFS=y             # /sys/class/gpio — bring-up debugging
CONFIG_GPIOLIB_IRQCHIP=y

# ---------------------------------------------------------------------------
# WiFi — Marvell 88W8997 (M.2 Key E J10, PCIe interface)
# ---------------------------------------------------------------------------
CONFIG_MWIFIEX=m
CONFIG_MWIFIEX_PCIE=y           # PCIe transport for 88W8997
CONFIG_MWIFIEX_SDIO=n           # Not used on EVK (PCIe only)

# ---------------------------------------------------------------------------
# Bluetooth — hci_uart for Marvell 88W8997 BT over uart3
# ---------------------------------------------------------------------------
CONFIG_BT=y
CONFIG_BT_HCIUART=y
CONFIG_BT_HCIUART_H4=y         # Standard H:4 HCI transport
CONFIG_BT_HCIUART_BCSP=n
CONFIG_BT_HCIUART_LL=n
CONFIG_BT_HCIUART_3WIRE=y
CONFIG_BT_HCIUART_MRVL=y       # Marvell vendor HCI extensions
CONFIG_BT_MRVL=m               # Marvell BT core
CONFIG_BT_MRVL_SDIO=n          # SDIO transport (not used)

# ---------------------------------------------------------------------------
# PCIe — required for Marvell WiFi module
# ---------------------------------------------------------------------------
CONFIG_PCI=y
CONFIG_PCIE_DW_IMX=y            # i.MX8MP DesignWare PCIe host

# ---------------------------------------------------------------------------
# RPMsg — A53 <-> M7 inter-core messaging
# ---------------------------------------------------------------------------
CONFIG_RPMSG=y
CONFIG_RPMSG_CHAR=y             # /dev/rpmsgN char device for user-space IPC
CONFIG_RPMSG_VIRTIO=y
CONFIG_IMX_RPMSG_PINGPONG=m    # Loopback test; remove from production image
CONFIG_MAILBOX=y
CONFIG_IMX_MBOX=y

# ---------------------------------------------------------------------------
# Remoteproc — lifecycle management for M7 firmware image
# ---------------------------------------------------------------------------
CONFIG_REMOTEPROC=y
CONFIG_IMX_REMOTEPROC=y

# ---------------------------------------------------------------------------
# Safety / watchdog
# ---------------------------------------------------------------------------
CONFIG_WATCHDOG=y
CONFIG_IMX2_WDT=y               # i.MX internal watchdog (A53 side)
CONFIG_WATCHDOG_NOWAYOUT=y      # Prevent accidental disable from user-space

# ---------------------------------------------------------------------------
# I2C — I2C3 sensor expansion bus
# ---------------------------------------------------------------------------
CONFIG_I2C=y
CONFIG_I2C_IMX=y
# TMP117 temperature sensor (Phase 2 — uncomment when sensor is fitted)
# CONFIG_SENSORS_TMP117=y

# ---------------------------------------------------------------------------
# Disable unused subsystems to reduce image size
# ---------------------------------------------------------------------------
CONFIG_SND_SOC_WM8960=n         # WM8960 audio codec depopulated on EVK dev build
CONFIG_VIDEO_IMX_ISP=n          # ISP not used (camera is USB, not CSI)
