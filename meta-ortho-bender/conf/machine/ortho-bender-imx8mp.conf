#@TYPE: Machine
#@NAME: Ortho-Bender Wire Bending Machine
#@SOC: i.MX8MP
#@DESCRIPTION: Custom board based on i.MX8MP for orthodontic wire bending

require conf/machine/imx8mp-lpddr4-evk.conf

# Kernel device tree
KERNEL_DEVICETREE = "freescale/imx8mp-ortho-bender.dtb"

# U-Boot config
UBOOT_CONFIG = "ortho-bender"

# M7 firmware
IMX_M7_DEMOS = "1"
M7_MACHINE = "MIMX8ML8"

# NPU support
IMX_SOC_REV_UPPER = "A1"

# Machine features
MACHINE_FEATURES += "can wifi bluetooth camera npu"

# Serial console
SERIAL_CONSOLES = "115200;ttymxc1"
